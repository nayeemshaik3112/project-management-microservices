services:

  mysql:
    image: mysql:8.0
    container_name: mysql-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: projectdb
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql

  config-server:
    image: config-server
    container_name: config-server
    ports:
      - "8888:8888"

  discovery-server:
    image: discovery-server
    container_name: discovery-server
    ports:
      - "8761:8761"
    depends_on:
      - config-server

  user-service:
    image: user-service
    container_name: user-service
    restart: always
    ports:
      - "8081:8081"
    depends_on:
      - discovery-server
      - mysql

  project-service:
    image: project-service
    container_name: project-service
    ports:
      - "8082:8082"
    depends_on:
      - discovery-server
      - mysql

  api-gateway:
    image: api-gateway
    container_name: api-gateway
    ports:
      - "8080:8080"
    depends_on:
      - discovery-server

  zipkin:
    image: openzipkin/zipkin
    container_name: zipkin
    ports:
      - "9411:9411"

volumes:
  mysql-data: