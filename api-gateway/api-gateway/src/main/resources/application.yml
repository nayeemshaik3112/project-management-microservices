server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      server:
        webflux:
          routes:

            - id: user-service
              uri: lb://USER-SERVICE
              predicates:
                - Path=/users/**

            - id: project-service
              uri: lb://PROJECT-SERVICE
              predicates:
                - Path=/projects/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka